<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin · Messages</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #05020a;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .login-box {
            max-width: 420px;
            margin: 100px auto;
            background: #0f0820;
            padding: 45px 35px;
            border-radius: 24px;
            border: 1px solid #3b1c6e;
            box-shadow: 0 0 40px rgba(107, 59, 201, 0.15);
        }
        .login-box h2 {
            color: #c49eff;
            font-size: 28px;
            text-align: center;
        }
        .login-box .subtitle {
            color: #6a5a8a;
            text-align: center;
            margin: 8px 0 28px;
            font-size: 14px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 20px;
            background: #140826;
            border: 1px solid #3b1c6e;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.25s;
        }
        .login-box input:focus {
            border-color: #9b6eff;
            box-shadow: 0 0 20px rgba(155, 110, 255, 0.12);
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6b3bc9, #9b6eff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
        }
        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(107, 59, 201, 0.35);
        }
        .login-error {
            color: #ff3b6f;
            text-align: center;
            margin-bottom: 14px;
            font-size: 14px;
            display: none;
        }

        .header {
            background: #0f0820;
            padding: 20px 28px;
            border-radius: 18px;
            margin-bottom: 28px;
            border: 1px solid #3b1c6e;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .header-left h1 {
            color: #c49eff;
            font-size: 26px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-left h1 span {
            background: #3b1c6e;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 15px;
            color: #9b6eff;
        }
        .stats {
            color: #6a5a8a;
            font-size: 14px;
            margin-top: 4px;
        }
        .stats strong {
            color: #9b6eff;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-refresh, .btn-logout {
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .btn-refresh {
            background: #3b1c6e;
            color: #c49eff;
            border-color: #6b3bc9;
        }
        .btn-refresh:hover {
            background: #6b3bc9;
            color: #fff;
        }
        .btn-logout {
            background: transparent;
            color: #ff3b6f;
            border-color: #ff3b6f;
        }
        .btn-logout:hover {
            background: #ff3b6f;
            color: #fff;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: #0f0820;
            padding: 6px;
            border-radius: 16px;
            border: 1px solid #3b1c6e;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            min-width: 110px;
            padding: 12px 18px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: #6a5a8a;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab-btn:hover {
            color: #c49eff;
            background: #1f0e3a;
        }
        .tab-btn.active {
            background: #3b1c6e;
            color: #fff;
            box-shadow: 0 4px 12px rgba(107, 59, 201, 0.25);
        }
        .tab-btn .badge {
            background: #6b3bc9;
            color: #fff;
            font-size: 11px;
            padding: 0 10px;
            border-radius: 30px;
            line-height: 20px;
        }
        .tab-btn.active .badge {
            background: #9b6eff;
        }

        .messages-grid {
            display: grid;
            gap: 20px;
        }
        .message-card {
            background: #0f0820;
            border-radius: 16px;
            padding: 24px 26px;
            border: 1px solid #3b1c6e;
            transition: 0.2s;
            position: relative;
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(14px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .message-card:hover {
            border-color: #6b3bc9;
            box-shadow: 0 8px 28px rgba(107, 59, 201, 0.10);
        }
        .message-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #6b3bc9, #9b6eff);
            border-radius: 0 4px 4px 0;
        }
        .message-card.unread::before {
            background: linear-gradient(180deg, #ff3b6f, #ff6b8a);
        }
        .message-card .card-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 12px;
        }
        .sender-name {
            font-weight: 600;
            color: #c49eff;
            font-size: 18px;
        }
        .sender-email, .sender-mobile, .sender-institution {
            font-size: 13px;
            margin-left: 8px;
        }
        .sender-email { color: #9b6eff; }
        .sender-mobile { color: #4ade80; }
        .sender-institution { color: #fbbf24; }
        .msg-time {
            color: #4a3a6a;
            font-size: 12px;
            background: #140826;
            padding: 4px 14px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .message-body {
            color: #b8a8d8;
            line-height: 1.6;
            padding: 14px 18px;
            background: #140826;
            border-radius: 10px;
            border-left: 2px solid #3b1c6e;
            white-space: pre-wrap;
            margin: 10px 0 14px;
        }
        .card-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .card-actions button {
            background: transparent;
            border: 1px solid #3b1c6e;
            color: #b8a8d8;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .card-actions button:hover {
            background: #3b1c6e;
            color: #fff;
        }
        .card-actions .mark-read-btn {
            border-color: #9b6eff;
            color: #9b6eff;
        }
        .card-actions .mark-read-btn:hover {
            background: #9b6eff;
            color: #fff;
        }
        .card-actions .archive-btn {
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .card-actions .archive-btn:hover {
            background: #fbbf24;
            color: #0a0216;
        }
        .card-actions .unarchive-btn {
            border-color: #6a5a8a;
            color: #6a5a8a;
        }
        .card-actions .unarchive-btn:hover {
            background: #6a5a8a;
            color: #fff;
        }
        .card-actions .delete-btn {
            border-color: #ff3b6f;
            color: #ff3b6f;
        }
        .card-actions .delete-btn:hover {
            background: #ff3b6f;
            color: #fff;
        }
        .status-badge {
            font-size: 11px;
            padding: 2px 12px;
            border-radius: 30px;
            margin-left: 10px;
        }
        .unread-badge {
            background: #2a1a2a;
            color: #ff6b8a;
        }
        .read-badge {
            background: #1a2a1a;
            color: #4ade80;
        }
        .archived-badge {
            background: #1f2a1a;
            color: #8a9a7a;
        }
        .deleted-badge {
            background: #2a1a1a;
            color: #ff6b6b;
        }

        .no-messages {
            text-align: center;
            padding: 70px 20px;
            background: #0f0820;
            border-radius: 16px;
            border: 1px solid #3b1c6e;
        }
        .no-messages .icon { font-size: 56px; opacity: 0.5; margin-bottom: 16px; }
        .no-messages h3 { color: #c49eff; margin-bottom: 6px; }
        .no-messages p { color: #4a3a6a; }
        .spinner {
            text-align: center;
            padding: 60px;
            color: #9b6eff;
        }
        .spinner::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 12px;
            border: 2px solid #3b1c6e;
            border-top: 2px solid #9b6eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            color: #ff3b6f;
            text-align: center;
            padding: 30px;
            background: #0f0820;
            border-radius: 16px;
            border: 1px solid #ff3b6f;
        }
        .error button {
            background: #3b1c6e;
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            margin-top: 14px;
        }
        .error button:hover { background: #6b3bc9; }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0f0820;
            border: 1px solid #3b1c6e;
            padding: 16px 24px;
            border-radius: 12px;
            color: #c49eff;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }
        .toast.success { border-color: #4ade80; color: #4ade80; }
        .toast.error { border-color: #ff3b6f; color: #ff3b6f; }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 700px) {
            .header { flex-direction: column; align-items: stretch; }
            .header-actions button { flex: 1; }
            .tabs { flex-direction: column; }
            .tab-btn { min-width: unset; }
        }
    </style>
</head>
<body>

<div id="loginSection" style="display:none;">
    <div class="login-box">
        <h2>🔐 Admin</h2>
        <p class="subtitle">Access the message dashboard</p>
        <div id="loginError" class="login-error">❌ Invalid password</div>
        <input type="password" id="passwordInput" placeholder="Enter admin password" />
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="adminSection" style="display:none;">
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>
                    📬 Messages
                    <span id="messageCount">0</span>
                </h1>
                <div class="stats">
                    Total: <strong id="totalMessages">0</strong> &nbsp;·&nbsp; 
                    Unread: <strong id="unreadCount">0</strong>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-refresh" onclick="loadMessages()">🔄 Refresh</button>
                <button class="btn-logout" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="unread" onclick="switchTab('unread')">
                📥 Unread <span class="badge" id="unreadBadge">0</span>
            </button>
            <button class="tab-btn" data-tab="read" onclick="switchTab('read')">
                ✅ Read <span class="badge" id="readBadge">0</span>
            </button>
            <button class="tab-btn" data-tab="archive" onclick="switchTab('archive')">
                🗃️ Archive <span class="badge" id="archiveBadge">0</span>
            </button>
            <button class="tab-btn" data-tab="deleted" onclick="switchTab('deleted')">
                🗑️ Deleted <span class="badge" id="deletedBadge">0</span>
            </button>
        </div>

        <div id="messagesContainer">
            <div class="spinner">Loading messages</div>
        </div>
    </div>
</div>

<script src="APP.js">
</script>
</body>
</html>
