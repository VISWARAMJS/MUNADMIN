<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - View Messages</title>
    <style>
        :root {
            --purple-1: #0a0216;
            --purple-2: #140826;
            --purple-3: #1f0e3a;
            --purple-4: #3b1c6e;
            --purple-5: #6b3bc9;
            --purple-6: #9b6eff;
            --purple-7: #c49eff;
            --purple-glow: #b87cff;
            --crisis-red: #ff3b6f;
            --dark-bg: #05020a;
            --card-bg: #0f0820;
            --success-green: #4ade80;
            --warning-yellow: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--dark-bg);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .login-box {
            max-width: 420px;
            margin: 100px auto;
            background: var(--card-bg);
            padding: 45px;
            border-radius: 20px;
            border: 1px solid var(--purple-4);
            box-shadow: 0 0 40px rgba(107, 59, 201, 0.15), inset 0 0 60px rgba(107, 59, 201, 0.05);
        }

        .login-box h2 {
            color: var(--purple-7);
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-box .subtitle {
            color: #6a5a8a;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 20px;
            background: var(--purple-2);
            border: 1px solid var(--purple-4);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        .login-box input:focus {
            border-color: var(--purple-6);
            box-shadow: 0 0 20px rgba(155, 110, 255, 0.15);
        }

        .login-box input::placeholder {
            color: #4a3a6a;
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--purple-5), var(--purple-6));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(107, 59, 201, 0.3);
        }

        .login-error {
            color: var(--crisis-red);
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .header {
            background: var(--card-bg);
            padding: 25px 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid var(--purple-4);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left h1 {
            color: var(--purple-7);
            font-size: 26px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left h1 span {
            background: var(--purple-4);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--purple-6);
        }

        .stats {
            color: #6a5a8a;
            font-size: 14px;
            margin-top: 5px;
        }

        .stats strong {
            color: var(--purple-6);
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-refresh {
            background: var(--purple-4);
            color: var(--purple-7);
            padding: 10px 22px;
            border: 1px solid var(--purple-5);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-refresh:hover {
            background: var(--purple-5);
            color: white;
        }

        .btn-logout {
            background: transparent;
            color: var(--crisis-red);
            padding: 10px 22px;
            border: 1px solid var(--crisis-red);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: var(--crisis-red);
            color: white;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 16px;
            border: 1px solid var(--purple-4);
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: #6a5a8a;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: var(--purple-4);
            color: var(--purple-7);
        }

        .tab:hover:not(.active) {
            background: var(--purple-2);
        }

        .messages-grid {
            display: grid;
            gap: 20px;
        }

        .message-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--purple-4);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .message-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, var(--purple-5), var(--purple-6));
        }

        .message-card:hover {
            transform: translateY(-3px);
            border-color: var(--purple-5);
            box-shadow: 0 8px 30px rgba(107, 59, 201, 0.15);
        }

        .message-card.read::before {
            background: #4a3a6a;
        }

        .message-card.archived {
            opacity: 0.6;
            border-color: var(--purple-2);
        }

        .message-card.archived::before {
            background: #2a1a4a;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .sender-info {
            flex: 1;
        }

        .sender-name {
            font-weight: 600;
            color: var(--purple-7);
            font-size: 18px;
        }

        .sender-email {
            color: var(--purple-6);
            font-size: 14px;
            margin-left: 10px;
        }

        .sender-mobile {
            color: var(--success-green);
            font-size: 14px;
            margin-left: 10px;
        }

        .sender-institution {
            color: var(--warning-yellow);
            font-size: 14px;
            margin-left: 10px;
        }

        .message-time {
            color: #4a3a6a;
            font-size: 12px;
            white-space: nowrap;
            padding: 4px 12px;
            background: var(--purple-2);
            border-radius: 20px;
        }

        .message-body {
            color: #b8a8d8;
            line-height: 1.6;
            margin: 15px 0;
            padding: 15px 18px;
            background: var(--purple-2);
            border-radius: 10px;
            white-space: pre-wrap;
            border-left: 2px solid var(--purple-4);
        }

        .message-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            border-top: 1px solid var(--purple-2);
            padding-top: 15px;
            flex-wrap: wrap;
        }

        .btn-read {
            background: var(--purple-4);
            color: var(--purple-7);
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-read:hover {
            background: var(--purple-5);
        }

        .btn-read.read-btn {
            background: #2a1a4a;
            color: #4a3a6a;
            cursor: default;
        }

        .btn-archive {
            background: var(--purple-2);
            color: var(--warning-yellow);
            padding: 8px 18px;
            border: 1px solid var(--warning-yellow);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-archive:hover {
            background: var(--warning-yellow);
            color: var(--dark-bg);
        }

        .btn-unarchive {
            background: var(--purple-2);
            color: var(--success-green);
            padding: 8px 18px;
            border: 1px solid var(--success-green);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-unarchive:hover {
            background: var(--success-green);
            color: var(--dark-bg);
        }

        .status-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-badge.unread {
            background: var(--crisis-red);
            color: white;
        }

        .status-badge.read {
            background: #4a3a6a;
            color: #8a7aaa;
        }

        .status-badge.archived {
            background: #2a1a4a;
            color: #6a5a8a;
        }

        .message-meta {
            color: #4a3a6a;
            font-size: 12px;
            margin-top: 10px;
        }

        .no-messages {
            text-align: center;
            padding: 80px 20px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--purple-4);
        }

        .no-messages .icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .no-messages h3 {
            color: var(--purple-7);
            font-size: 22px;
            margin-bottom: 10px;
        }

        .no-messages p {
            color: #4a3a6a;
            font-size: 14px;
        }

        .spinner {
            text-align: center;
            padding: 60px;
            color: var(--purple-6);
            font-size: 18px;
        }

        .spinner::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 12px;
            border: 2px solid var(--purple-4);
            border-top: 2px solid var(--purple-6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: var(--crisis-red);
            text-align: center;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--crisis-red);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            display: none;
        }

        .toast.success {
            background: var(--success-green);
            color: var(--dark-bg);
        }

        .toast.error {
            background: var(--crisis-red);
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                justify-content: stretch;
            }
            .header-actions button {
                flex: 1;
            }
            .message-header {
                flex-direction: column;
            }
            .sender-name {
                display: block;
                margin-bottom: 5px;
            }
            .sender-email,
            .sender-mobile,
            .sender-institution {
                display: inline-block;
                margin: 3px 0;
            }
            .login-box {
                margin: 50px 20px;
                padding: 30px;
            }
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div id="loginSection" style="display: none;">
        <div class="login-box">
            <h2>🔐 Admin Access</h2>
            <p class="subtitle">Enter your credentials to view messages</p>
            <div id="loginError" class="login-error">Invalid password! Please try again.</div>
            <input type="password" id="passwordInput" placeholder="Enter admin password">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <div id="adminSection" style="display: none;">
        <div class="container">
            <div class="header">
                <div class="header-left">
                    <h1>
                        📬 Messages
                        <span id="messageCount">0</span>
                    </h1>
                    <div class="stats">
                        Total: <strong id="totalMessages">0</strong> | 
                        Unread: <strong id="unreadCount" style="color:var(--crisis-red)">0</strong> | 
                        Archived: <strong id="archivedCount" style="color:#6a5a8a">0</strong>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn-refresh" onclick="loadMessages()">🔄 Refresh</button>
                    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('inbox')" id="tabInbox">📥 Inbox</button>
                <button class="tab" onclick="switchTab('archived')" id="tabArchived">📦 Archived</button>
            </div>
            
            <div id="messagesContainer">
                <div class="spinner">Loading messages</div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
  <script src = "APP.js"></script>
</body>
</html>
